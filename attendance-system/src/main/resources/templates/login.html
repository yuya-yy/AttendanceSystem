<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/style_login.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>


<body class="page-body">

    <header class="main-header">
        <div class="header-inner">
            <div class="header-title">勤怠管理システム</div>
        </div>
        <div class="header-line"></div>
    </header>

    <main class="page-main">

        <section class="form-card">
            <h2 class="form-card-title">ログイン</h2>

            <!-- フラッシュメッセージ（エラー） -->
            <div class="login-message-area">
                <div class="login-message-box"
                    th:classappend="${flashError} ? ' is-error' : (${flashInfo} ? ' is-info' : ' is-empty')"
                    th:text="${flashError != null ? flashError : (flashInfo != null ? flashInfo : '')}">
                </div>
            </div>

            <!-- ログインフォーム -->
            <form th:action="@{/auth/login}" method="post" novalidate>

                <!-- ユーザー名 -->
                <div class="form-field-block">
                    <label for="loginUser" class="form-field-label">ユーザー名</label>
                    <input id="loginUser" name="username" type="text" class="form-field-input" autocomplete="username"
                        th:value="${loginUsername}" />
                </div>

                <!-- パスワード + 目アイコン（アイコンのみ） -->
                <div class="form-field-block">
                    <label for="loginPass" class="form-field-label">パスワード</label>
                    <div class="password-row">
                        <input id="loginPass" name="password" type="password" class="form-field-input"
                            autocomplete="current-password" />

                        <button type="button" class="password-visibility-button js-password-toggle"
                            data-target="loginPass" aria-label="パスワードを表示" aria-pressed="false">
                            <i class="fa-regular fa-eye-slash js-eye-icon" aria-hidden="true"></i>
                        </button>
                    </div>
                </div>

                <!-- ボタン -->
                <div class="form-button-row">
                    <button type="submit" class="primary-action-button">
                        ログインする
                    </button>
                </div>

            </form>
        </section>

    </main>
</body>

<script th:src="@{/js/password-toggle.js}" defer></script>

</html>
