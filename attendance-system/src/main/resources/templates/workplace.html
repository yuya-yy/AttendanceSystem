<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
    <meta charset="UTF-8">
    <title>勤務場所登録</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/style_workplace.css}">
</head>

<body class="page-body">

    <!-- 共通ヘッダー -->
    <div th:replace="~{fragments/header :: header('workLocation')}"></div>

    <main class="page-main">

        <section class="form-card">
            <h2 class="form-card-title">勤務場所登録</h2>

            <!-- フラッシュメッセージ（エラー／情報） -->
            <div class="workplace-message-area">
                <div class="workplace-message-box"
                    th:classappend="${flashError} ? ' is-error' : (${flashInfo} ? ' is-info' : ' is-empty')"
                    th:text="${flashError != null ? flashError : (flashInfo != null ? flashInfo : '')}">
                </div>
            </div>


            <!-- 勤務場所登録フォーム -->
            <form th:action="@{/attendance/work-location}" method="post" class="workplace-form">

                <div class="radio-list">
                    <!-- 勤務場所マスタ一覧からラジオボタンを生成 -->
                    <label class="radio-line" th:each="loc : ${workLocations}">
                        <input type="radio" name="workLocationId" th:value="${loc.id}"
                            th:checked="${selectedWorkLocationId} != null and ${selectedWorkLocationId} == ${loc.id}" />
                        <span th:text="${loc.locationName}">会社</span>
                    </label>
                </div>

                <div class="form-button-row">
                    <button type="submit" class="primary-action-button">
                        登録
                    </button>
                </div>
            </form>
        </section>

    </main>

</body>

</html>
