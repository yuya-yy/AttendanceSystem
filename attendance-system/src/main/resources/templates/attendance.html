<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
    <meta charset="UTF-8">
    <title>勤怠入力</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/style_attendance.css}">
</head>

<body class="page-body">

    <!-- 共通ヘッダー -->
    <div th:replace="~{fragments/header :: header('attendance')}"></div>

    <!-- 勤怠入力画面のメイン領域 -->
    <main class="attendance-main">

        <!-- 画面タイトル -->
        <div class="page-title">勤怠入力画面</div>

        <!-- 左右２カラム -->
        <div class="attendance-layout">

            <!-- 左ブロック：勤務状況情報 + 勤怠一覧テーブル -->
            <section class="attendance-table-card">

                <!-- 勤務状況 / 勤務場所 の表示部分 -->
                <div class="attendance-info-top">
                    <div class="attendance-status-row">
                        <span class="label-gray">勤務状況</span>
                        <span class="value-gray">出勤中</span>
                    </div>
                    <div class="attendance-status-row">
                        <span class="label-gray">勤務場所</span>
                        <span class="value-gray">会社</span>
                    </div>
                </div>

                <!-- 黒枠の勤怠テーブル -->
                <div class="attendance-table-wrapper">
                    <table class="attendance-table">
                        <thead>
                            <tr>
                                <th>日付</th>
                                <th>出勤時刻</th>
                                <th>退勤時刻</th>
                                <th>勤務時間</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>10月22日 (水)</td>
                                <td>8:00</td>
                                <td>18:00</td>
                                <td>8:32</td>
                            </tr>
                            <!-- 将来的にはここを th:each="rec : ${attendanceList}" にして繰り返し -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- 右ブロック：ユーザー情報＋現在時刻＋出勤/退勤ボタン -->
            <aside class="attendance-side">

                <!-- ようこそ ○○ さん -->
                <div class="attendance-user-block">
                    <div class="welcome-line">
                        ようこそ〇〇〇〇〇〇さん
                    </div>
                    <div class="dept-line">
                        〇〇〇部 / 管理者
                    </div>
                </div>

                <!-- 日付と現在時刻 -->
                <div class="attendance-clock-block">
                    <div class="clock-date">10月 22日 (水)</div>
                    <div class="clock-time">15:30</div>
                </div>

                <!-- 出勤 / 退勤 ボタン -->
                <div class="attendance-buttons">
                    <button class="time-button">出勤</button>
                    <button class="time-button">退勤</button>
                </div>

            </aside>
        </div>

    </main>

</body>

</html>
