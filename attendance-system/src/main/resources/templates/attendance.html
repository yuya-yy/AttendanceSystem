<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
    <meta charset="UTF-8">
    <title>勤怠入力</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/style_attendance.css}">
</head>

<body class="page-body">

    <!-- 共通ヘッダー -->
    <div th:replace="~{fragments/header :: header('attendance')}"></div>

    <!-- 勤怠入力画面のメイン領域 -->
    <main class="attendance-main">

        <!-- 画面タイトル -->
        <div class="page-title">
            <span class="page-title-text">勤怠入力画面</span>
            <div class="attendance-info-top">
                <div class="attendance-status-row">
                    <span class="label-gray">勤務状況</span>
                    <span class="value-gray" th:text="${workStatusLabel}">勤務状況</span>
                </div>

                <div class="attendance-status-row">
                    <span class="label-gray">勤務場所</span>
                    <!-- デフォルト勤務場所名など（例：会社／在宅） -->
                    <span class="value-gray" th:text="${currentWorkLocationName}">会社</span>
                </div>
            </div>
        </div>

        <!-- メッセージ表示（エラー／情報） -->


        <!-- 左右２カラム -->
        <div class="attendance-user-block">
            <div class="welcome-line">
                ようこそ
                <span th:text="${displayName}">山田 太郎</span>
                さん
            </div>
            <div class="dept-line">
                <span th:text="${departmentName}">システム部</span>
                /
                <span th:text="${roleLabel}">管理者</span>
            </div>
        </div>
        <div class="attendance-layout">

            <!-- 左ブロック：勤務状況情報 + 勤怠一覧テーブル -->
            <section class="attendance-table-card">
                <!-- 黒枠の勤怠テーブル -->
                <div class="attendance-table-wrapper">
                    <table class="attendance-table">
                        <thead>
                            <tr>
                                <th>日付</th>
                                <th>出勤時刻</th>
                                <th>退勤時刻</th>
                                <th>勤務時間</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- 直近30日分の勤怠履歴を表示する想定 -->
                            <tr th:each="record : ${recentRecords}">
                                <!-- 日付：workDate を日本語形式で表示 -->
                                <td th:text="${#temporals.format(record.workDate, 'M月 d日 (E)')}">
                                    10月22日 (水)
                                </td>

                                <td th:text="${record.clockIn != null
                                                ? #temporals.format(
                                                    record.clockIn.withOffsetSameInstant(
                                                        T(java.time.ZoneOffset).ofHours(9)
                                                    ),
                                                    'HH:mm'
                                                )
                                            : ''}">
                                    8:00
                                </td>

                                <!-- 退勤時刻：同じく +09:00 に直してから表示 -->
                                <td th:text="${record.clockOut != null
                                                ? #temporals.format(
                                                    record.clockOut.withOffsetSameInstant(
                                                        T(java.time.ZoneOffset).ofHours(9)
                                                ),
                                                'HH:mm'
                                                )
                                            : ''}">
                                    18:00
                                </td>

                                <td th:text="${record.workingTimeText}">8時間32分</td>
                            </tr>

                            <!-- レコードが1件もない場合の表示 -->
                            <tr th:if="${#lists.isEmpty(recentRecords)}">
                                <td colspan="4" class="attendance-empty-row">
                                    直近30日間の勤怠データはありません。
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- 右ブロック：ユーザー情報＋現在時刻＋出勤/退勤ボタン -->
            <aside class="attendance-side">
                <div class="attendance-message-area">
                    <div class="attendance-message-box"
                        th:classappend="${flashError} ? ' is-error' : (${flashInfo} ? ' is-info' : ' is-empty')"
                        th:text="${flashError != null ? flashError : (flashInfo != null ? flashInfo : '')}">
                    </div>
                </div>
                <!-- 日付と現在時刻（サーバーで用意した文字列を表示する想定） -->
                <div class="attendance-clock-block" id="attendanceClock"
                    th:attr="data-server-epoch=${serverEpochMillis}">
                    <div class="clock-date" th:text="${todayDateText}">
                        10月 22日 (水)
                    </div>
                    <div class="clock-time" th:text="${nowTimeText}">
                        15:30
                    </div>
                </div>

                <!-- 出勤 / 退勤 ボタン -->
                <div class="attendance-buttons">

                    <!-- 出勤ボタン -->
                    <form th:action="@{/attendance/clock-in}" method="post" class="attendance-button-form">
                        <!-- CSRFトークン -->

                        <button type="submit" class="time-button">出勤</button>
                    </form>

                    <!-- 退勤ボタン -->
                    <form th:action="@{/attendance/clock-out}" method="post" class="attendance-button-form">
                        <!-- CSRFトークン -->

                        <button type="submit" class="time-button">退勤</button>
                    </form>

                </div>

            </aside>
            <script th:src="@{/js/attendance-clock.js}"></script>
        </div>

    </main>

</body>

</html>
