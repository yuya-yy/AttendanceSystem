<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
    <meta charset="UTF-8">
    <title>連絡先登録</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/style_contact.css}">
</head>

<body class="page-body">

    <!-- 共通ヘッダー -->
    <div th:replace="~{fragments/header :: header('contact')}"></div>

    <main class="page-main">
        <section class="form-card">
            <h2 class="form-card-title">連絡先登録</h2>

            <!-- フラッシュメッセージ（エラー／情報） -->
            <div th:if="${flashError}" class="alert-error" th:text="${flashError}"></div>
            <div th:if="${flashInfo}" class="alert-info" th:text="${flashInfo}"></div>

            <form th:action="@{/attendance/contact}" method="post">

                <!-- メールアドレス -->
                <div class="form-field-block">
                    <label for="email" class="form-field-label">メールアドレス</label>
                    <input type="email" id="email" name="email" class="form-field-input"
                        th:value="${formEmail != null ? formEmail : (contactInfo != null ? contactInfo.email : '')}" />
                </div>

                <!-- 電話番号 -->
                <div class="form-field-block">
                    <label for="phone" class="form-field-label">電話番号</label>
                    <input type="text" id="phone" name="phone" class="form-field-input"
                        th:value="${formPhone != null ? formPhone : (contactInfo != null ? contactInfo.phone : '')}" />
                </div>

                <!-- 登録ボタン -->
                <div class="form-button-row">
                    <button type="submit" class="primary-action-button">
                        登録
                    </button>
                </div>

            </form>
        </section>
    </main>

</body>

</html>
