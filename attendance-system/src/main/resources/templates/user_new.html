<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
    <meta charset="UTF-8">
    <title>新規ユーザー登録</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/style_user_new.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>


<body class="page-body">

    <!-- 共通ヘッダー -->
    <div th:replace="~{fragments/header :: header('userNew')}"></div>

    <main class="page-main">

        <section class="form-card">
            <h2 class="form-card-title">新規ユーザー登録</h2>

            <!-- ★ 業務エラー（BusinessException）のメッセージを表示 -->
            <div class="user-new-message-area">
                <div class="user-new-message-box" th:classappend="${flashError} ? ' is-error' : ' is-empty'"
                    th:text="${flashError != null ? flashError : ''}">
                </div>
            </div>

            <!-- ★ POST先を /users/new に変更 -->
            <form th:action="@{/users/new}" method="post">

                <div class="form-grid-2col">
                    <!-- ユーザー名 -->
                    <div class="form-grid-item">
                        <label for="username" class="form-field-label">ユーザー名</label>
                        <input id="username" name="username" type="text" class="form-field-input"
                            th:value="${username}" />
                    </div>

                    <!-- 氏名（表示名） -->
                    <div class="form-grid-item">
                        <label for="displayName" class="form-field-label">氏名（表示名）</label>
                        <input id="displayName" name="displayName" type="text" class="form-field-input"
                            th:value="${displayName}" />
                    </div>

                    <!-- パスワード（アイコンだけで表示/非表示） -->
                    <div class="form-grid-item">
                        <label for="password" class="form-field-label">パスワード</label>
                        <div class="password-row" style="margin-bottom:8px;">
                            <input id="password" name="password" type="password" class="form-field-input"
                                autocomplete="new-password" />

                            <!-- ★ ここをアイコンだけにする -->
                            <button type="button" class="password-visibility-button js-password-toggle"
                                data-target="password" aria-label="パスワードを表示" aria-pressed="false">
                                <i class="fa-regular fa-eye-slash js-eye-icon" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>

                    <!-- メールアドレス -->
                    <div class="form-grid-item">
                        <label for="email" class="form-field-label">メールアドレス</label>
                        <input id="email" name="email" type="email" class="form-field-input" th:value="${email}" />
                    </div>

                    <!-- 所属部署（プルダウン） -->
                    <div class="form-grid-item">
                        <label for="departmentId" class="form-field-label">所属部署</label>
                        <select id="departmentId" name="departmentId" class="form-field-input">
                            <option value="">選択してください</option>
                            <option th:each="dept : ${departments}" th:value="${dept.id}"
                                th:text="${dept.departmentName}" th:selected="${departmentIdValue} == ${dept.id}">
                            </option>
                        </select>
                    </div>

                    <!-- 電話番号 -->
                    <div class="form-grid-item">
                        <label for="phone" class="form-field-label">電話番号</label>
                        <input id="phone" name="phone" type="text" class="form-field-input" th:value="${phone}" />
                    </div>

                    <!-- 権限（ラジオボタン） -->
                    <div class="form-grid-item">
                        <span class="form-field-label">権限</span>
                        <div class="inline-radio-group">
                            <label class="inline-radio-option">
                                <input type="radio" name="role" value="1" th:checked="${roleValue} == '1'" />
                                <span>管理者</span>
                            </label>
                            <label class="inline-radio-option">
                                <input type="radio" name="role" value="2" th:checked="${roleValue} == '2'" />
                                <span>一般</span>
                            </label>
                        </div>
                    </div>

                    <!-- レイアウト用の空き -->
                    <div class="form-grid-item"></div>
                </div>

                <div class="form-button-row">
                    <button type="submit" class="primary-action-button">
                        登録
                    </button>
                </div>

            </form>
        </section>

    </main>

</body>

<script th:src="@{/js/password-toggle.js}" defer></script>

</html>
