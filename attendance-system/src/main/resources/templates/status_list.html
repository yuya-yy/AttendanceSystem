<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
    <meta charset="UTF-8">
    <title>勤怠状況一覧</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/style_status_list.css}">
</head>

<body class="page-body">

    <!-- 共通ヘッダー -->
    <div th:replace="~{fragments/header :: header('status')}"></div>

    <main class="status-main page-container">
        <!-- タイトル行 -->
        <div class="status-title-row">
            <div class="page-title">勤怠状況一覧</div>
            <div class="dept-badge" title="表示中の部門">〇〇部署</div>
        </div>

        <!-- 検索ボックス -->
        <div class="user-list-search-row">
            <div class="user-list-search-box">
                <span class="user-list-search-icon">🔍</span>
                <input class="user-list-search-input" type="text" name="q" placeholder="ユーザー検索" />
            </div>
        </div>

        <!-- （将来）フィルタ UI を足すならこのあたりに filter-section を置く -->

        <!-- テーブル（太枠） -->
        <div class="status-list-table-frame">
            <table class="status-list-table">
                <thead>
                    <tr>
                        <th class="th-left">名前</th>
                        <th>勤務状況</th>
                        <th>勤務場所</th>
                        <th>メールアドレス</th>
                        <th class="th-right">電話番号</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.displayName}">名前</td>

                        <!-- 勤務状況：Set に含まれていたら「勤務中」、そうでなければ「勤務外」 -->
                        <td th:text="${workingUserIds.contains(user.id)} ? '勤務中' : '勤務外'">勤務状況</td>

                        <!-- 勤務場所：defaultWorkLocation が null のときは「未設定」 -->
                        <td
                            th:text="${user.defaultWorkLocation != null} ? ${user.defaultWorkLocation.locationName} : '未設定'">
                            勤務場所
                        </td>

                        <td th:text="${user.email}">メール</td>
                        <td th:text="${user.phone}">電話番号</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>

</html>
