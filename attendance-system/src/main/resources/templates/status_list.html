<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
    <meta charset="UTF-8">
    <title>勤怠状況一覧</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="page-body">

    <!-- 共通ヘッダー -->
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="status-main page-container">
        <!-- タイトル行 -->
        <div class="status-title-row">
            <div class="page-title">勤怠状況一覧</div>
            <div class="dept-badge" title="表示中の部門">〇〇部署</div>
        </div>

        <!-- 検索ボックス -->
        <div class="user-list-search-row">
            <div class="user-list-search-box">
                <span class="user-list-search-icon">🔍</span>
                <input class="user-list-search-input" type="text" name="q" placeholder="ユーザー検索" />
            </div>
        </div>

        <!-- テーブル（太枠） -->
        <div class="status-list-table-frame">
            <table class="status-list-table">
                <thead>
                    <tr>
                        <th class="th-left">
                            名前 <span class="sort-indicator" aria-hidden="true"></span>
                        </th>
                        <th>
                            勤務状況 <span class="sort-indicator" aria-hidden="true"></span>
                        </th>
                        <th>
                            勤務場所 <span class="sort-indicator" aria-hidden="true"></span>
                        </th>
                        <th>
                            メールアドレス <span class="sort-indicator" aria-hidden="true"></span>
                        </th>
                        <th class="th-right">
                            電話番号 <span class="sort-indicator" aria-hidden="true"></span>
                        </th>
                    </tr>
                </thead>
                <tbody>
                    <!-- 仮データ -->
                    <tr>
                        <td>〇〇〇〇〇〇〇〇</td>
                        <td>勤務中</td>
                        <td>会社</td>
                        <td>oooooo @gmail.com</td>
                        <td>090-9090-909</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>

</html>
