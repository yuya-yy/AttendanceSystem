<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
    <meta charset="UTF-8">
    <title>勤怠状況</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/style_status_list.css}">
    <script th:src="@{/js/common.js}" defer></script>
    <script th:src="@{/js/status_list.js}" defer></script>
</head>

<body class="page-body">

    <!-- 共通ヘッダー -->
    <div th:replace="~{fragments/header :: header('status')}"></div>

    <main class="status-list-main">
        <div class="status-list-top">
            <!-- タイトル行 -->
            <div class="status-list-top-left">
                <div class="page-title" th:text="${status.departmentName + 'の勤怠状況'}">勤怠状況</div>

                <div class="status-list-message-area">
                    <div class="status-list-message-box"
                        th:classappend="${flashError} ? ' is-error' : (${flashInfo} ? ' is-info' : ' is-empty')"
                        th:text="${flashError != null ? flashError : (flashInfo != null ? flashInfo : '')}">
                    </div>
                </div>
            </div>

            <div class="status-list-top-right">
                <!-- 検索・絞り込み -->
                <section class="status-list-filter-section">
                    <!-- 1段目：名前検索 -->
                    <div class="status-list-filter-row">
                        <div class="status-list-filter-group">
                            <span class="status-list-filter-label">ユーザー検索</span>
                            <!-- ★JSが参照する id はそのまま -->
                            <input id="keywordInput" type="text" class="status-list-filter-input"
                                placeholder="氏名を入力してください">
                        </div>
                    </div>

                    <!-- 2段目：勤務状況・勤務場所 -->
                    <div class="status-list-filter-row">
                        <div class="status-list-filter-group">
                            <span class="status-list-filter-label">勤務状況　
                            </span>
                            <select id="statusFilter" class="status-list-filter-select">
                                <option value="ALL">すべて</option>
                                <option value="WORKING">勤務中のみ</option>
                                <option value="OFF">勤務外のみ</option>
                            </select>
                        </div>

                        <div class="status-list-filter-group">
                            <span class="status-list-filter-label">勤務場所</span>
                            <select id="locationFilter" class="status-list-filter-select">
                                <option value="ALL">すべて</option>
                                <option value="OFFICE">会社</option>
                                <option value="HOME">在宅</option>
                                <option value="TRIP">出張</option>
                                <option value="CLIENT">客先</option>
                                <option value="OTHER">その他</option>
                            </select>
                        </div>
                    </div>

                    <!-- 件数＆0件メッセージ -->
                    <div class="status-list-result-info">
                        <!-- ★JSが参照する id はそのまま -->
                        <span id="resultCount">0件表示中</span>
                        <span id="resultEmpty" class="status-list-result-empty">条件に一致するユーザーがいません。</span>
                    </div>
                </section>
            </div>
        </div>

        <!-- テーブル枠 -->
        <!-- ※JSがこの id を使っている可能性があるので維持 -->
        <div id="statusTable" class="status-list-table-frame">
            <table class="status-list-table">
                <thead>
                    <tr>
                        <th>名前</th>
                        <th>勤務状況</th>
                        <th>勤務場所</th>
                        <th>メールアドレス</th>
                        <th>電話番号</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="user : ${status.users}" th:if="${user != null}"
                        th:with="working=${status.isWorking(user.id)}" th:attr="data-name=${user.displayName},
                            data-status=${working ? 'WORKING' : 'OFF'},
                            data-location=${user.defaultWorkLocation != null ? user.defaultWorkLocation.code : 'OTHER'}
                        ">
                        <td th:text="${user.displayName}">名前</td>

                        <!-- ★Thymeleafの三項演算子は「式の中で」書く -->
                        <td th:text="${working ? '勤務中' : '勤務外'}">
                            勤務状況
                        </td>

                        <!-- ★ ${} を入れ子にしない -->
                        <td
                            th:text="${user.defaultWorkLocation != null ? user.defaultWorkLocation.locationName : '未設定'}">
                            勤務場所
                        </td>

                        <!-- null対策（見た目を安定） -->
                        <td th:text="${user.email != null ? user.email : '-'}">メール</td>
                        <td th:text="${user.phone != null ? user.phone : '-'}">電話番号</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>
</body>

</html>
